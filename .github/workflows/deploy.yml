name: Deploy Frontend

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Build and restart container
        run: |
          docker compose build --no-cache \
            --build-arg VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          docker compose up -d
